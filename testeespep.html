<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Comparativo - ESPEP</title>

<style>
body{
    font-family: Arial;
    background:#eef2f7;
    padding:20px;
}

h1{
    text-align:center;
    color:#0d3b66;
}

.container{
    max-width:1300px;
    margin:auto;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select, button{
    padding:8px;
    margin:5px;
}

button{
    background:#0d3b66;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#094a86;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:#fff;
}

th, td{
    border:1px solid #ccc;
    padding:6px;
    font-size:13px;
    text-align:center;
}

th{
    background:#0d3b66;
    color:#fff;
}

.actions button{
    background:#c0392b;
}

@media print{
    .no-print{
        display:none;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>MAPA COMPARATIVO DE PREÇOS</h1>

<div class="card no-print">
<h3>Cadastro do Item</h3>
<input id="descricao" placeholder="Descrição">
<input id="qtd" type="number" placeholder="Quantidade">
<input id="und" placeholder="Unidade">
<button onclick="addItem()">Adicionar</button>
</div>

<div class="card no-print">
<h3>Adicionar Cotação</h3>
<select id="itemSelect"></select>
<input id="empresa" placeholder="Empresa">
<input id="cnpj" placeholder="CNPJ">
<input id="valor" type="number" placeholder="Valor Unitário">
<button onclick="addCotacao()">Adicionar Cotação</button>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Descrição</th>
<th>Qtd</th>
<th>Empresa</th>
<th>CNPJ</th>
<th>V.Unit</th>
<th>Total</th>
<th>Média</th>
<th>Mediana</th>
<th>Saneada</th>
<th>Variância</th>
<th>Desvio</th>
<th>Mín</th>
<th>Máx</th>
<th class="no-print">Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="no-print" onclick="window.print()">🖨️ Imprimir</button>

</div>

<script>

let itens = JSON.parse(localStorage.getItem("itens")) || [];

function salvar(){
    localStorage.setItem("itens", JSON.stringify(itens));
}

function addItem(){
    let item = {
        descricao:descricao.value,
        qtd:parseFloat(qtd.value),
        und:und.value,
        cotacoes:[]
    };

    itens.push(item);
    salvar();
    atualizarSelect();
    render();
}

function atualizarSelect(){
    itemSelect.innerHTML = "";
    itens.forEach((i, index)=>{
        itemSelect.innerHTML += `<option value="${index}">Item ${index+1}</option>`;
    });
}

function addCotacao(){
    let i = itemSelect.value;

    itens[i].cotacoes.push({
        empresa:empresa.value,
        cnpj:cnpj.value,
        valor:parseFloat(valor.value)
    });

    salvar();
    render();
}

function removerCotacao(itemIndex, cotIndex){
    itens[itemIndex].cotacoes.splice(cotIndex,1);
    salvar();
    render();
}

function stats(valores){

    let n = valores.length;
    let media = valores.reduce((a,b)=>a+b,0)/n;

    let ord = [...valores].sort((a,b)=>a-b);

    let mediana = n%2 ? ord[Math.floor(n/2)] : (ord[n/2-1]+ord[n/2])/2;

    let saneado = ord.slice(1,-1);
    let mediaSaneada = saneado.length ? saneado.reduce((a,b)=>a+b,0)/saneado.length : media;

    let variancia = valores.reduce((a,b)=>a + (b-media)**2,0)/n;

    return {
        media,
        mediana,
        mediaSaneada,
        variancia,
        desvio: Math.sqrt(variancia),
        min: Math.min(...valores),
        max: Math.max(...valores)
    };
}

function render(){

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    itens.forEach((item, i)=>{

        if(item.cotacoes.length === 0) return;

        let totais = item.cotacoes.map(c=>c.valor * item.qtd);
        let s = stats(totais);

        item.cotacoes.forEach((c, j)=>{

            let total = c.valor * item.qtd;

            tbody.innerHTML += `
            <tr>
                <td>${i+1}</td>
                <td>${item.descricao}</td>
                <td>${item.qtd} ${item.und}</td>
                <td>${c.empresa}</td>
                <td>${c.cnpj}</td>
                <td>R$ ${c.valor.toFixed(2)}</td>
                <td>R$ ${total.toFixed(2)}</td>

                ${j===0 ? `
                <td rowspan="${item.cotacoes.length}">${s.media.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.mediana.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.mediaSaneada.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.variancia.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.desvio.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.min.toFixed(2)}</td>
                <td rowspan="${item.cotacoes.length}">${s.max.toFixed(2)}</td>
                ` : ""}

                <td class="no-print actions">
                    <button onclick="removerCotacao(${i},${j})">X</button>
                </td>
            </tr>
            `;
        });
    });
}

atualizarSelect();
render();

</script>

</body>
</html>
