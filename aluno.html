<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
background:#1e293b;
border:none;
border-radius:10px;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>🎓 Aluno</h4>

<button class="btn btn-light" onclick="mostrar('materiais')">Materiais</button>

<button class="btn btn-light" onclick="mostrar('matricula')">Minha Matrícula</button>

<button class="btn btn-danger mt-3" onclick="logout()">Sair</button>

</div>

<div class="content">

<!-- MATERIAIS -->

<div id="materiais">

<h3>📚 Materiais</h3>

<div id="listaMateriais" class="row"></div>

</div>

<!-- MATRÍCULA -->

<div id="matricula" style="display:none">

<h3>📄 Minha Matrícula</h3>

<div id="dadosAluno"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario = localStorage.getItem("usuario")

if(!usuario){
window.location="index.html"
}

window.logout = function(){
localStorage.clear()
window.location="index.html"
}

window.mostrar = function(sec){

["materiais","matricula"].forEach(id=>{

document.getElementById(id).style.display="none"

})

document.getElementById(sec).style.display="block"

}

async function carregarMateriais(){

const snap = await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(doc=>{

const m = doc.data()

html+=`

<div class="col-md-4 mb-3">

<div class="card p-3">

<h5>${m.titulo}</h5>
<p>${m.materia}</p>

<a href="${m.url}" target="_blank" class="btn btn-primary">
Abrir PDF
</a>

</div>

</div>

`

})

document.getElementById("listaMateriais").innerHTML = html

}

async function carregarAluno(){

const snap = await getDocs(collection(db,"usuarios"))

snap.forEach(doc=>{

const a = doc.data()

if(a.usuario === usuario){

const hoje = new Date()
const fim = new Date(a.fim)

const diff = Math.ceil((fim-hoje)/(1000*60*60*24))

document.getElementById("dadosAluno").innerHTML = `

<div class="card p-4">

<h4>${a.nome}</h4>

<p><b>Telefone:</b> ${a.telefone}</p>
<p><b>Matrícula:</b> ${a.matricula}</p>
<p><b>Pagamento:</b> ${a.pagamento}</p>

<p><b>Válido até:</b> ${a.fim}</p>

<p><b>Dias restantes:</b> ${diff}</p>

</div>

`

}

})

}

carregarMateriais()
carregarAluno()

</script>

</body>
</html>
