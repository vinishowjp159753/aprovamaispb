<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8fafc;
font-family:Arial;
}

.header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.menu{
display:flex;
gap:10px;
margin-bottom:20px;
}

.material{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.card{
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>Portal do Aluno</h2>

</div>

<div class="container mt-4">

<div class="menu">

<button class="btn btn-primary" onclick="mostrar('materiais')">
Materiais
</button>

<button class="btn btn-secondary" onclick="mostrar('matricula')">
Matrícula
</button>

</div>

<div id="materiais">

<h4>Materiais disponíveis</h4>

<div id="listaMateriais"></div>

</div>

<div id="matricula" style="display:none">

<h4>Dados da Matrícula</h4>

<div id="dadosMatricula"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78",
storageBucket:"aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId:"830264910104",
appId:"1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId:"G-PM06K116GT"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.mostrar=function(sec){

document.getElementById("materiais").style.display="none"
document.getElementById("matricula").style.display="none"

document.getElementById(sec).style.display="block"

}

async function carregarMateriais(){

const snap = await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(doc=>{

const m = doc.data()

html += `

<div class="material">

<div>

<b>${m.titulo}</b>
<br>
${m.materia}

</div>

<a href="${m.url}" target="_blank" class="btn btn-success">
Baixar
</a>

</div>

`

})

document.getElementById("listaMateriais").innerHTML = html

}

async function carregarMatricula(){

const usuario = localStorage.getItem("usuario")

const q = query(
collection(db,"usuarios"),
where("usuario","==",usuario)
)

const snap = await getDocs(q)

snap.forEach(doc=>{

const a = doc.data()

const hoje = new Date()
const fim = new Date(a.fim)

const diff = fim - hoje
const dias = Math.ceil(diff / (1000*60*60*24))

document.getElementById("dadosMatricula").innerHTML = `

<div class="card p-4">

<b>Nome:</b> ${a.nome}
<br><br>

<b>Telefone:</b> ${a.telefone}
<br><br>

<b>Matrícula:</b> ${a.matricula}
<br><br>

<b>Forma de pagamento:</b> ${a.pagamento}
<br><br>

<b>Início:</b> ${a.inicio}
<br><br>

<b>Expira em:</b> ${a.fim}
<br><br>

<h5 class="text-danger">

⏳ Restam ${dias} dias para vencer

</h5>

</div>

`

})

}

carregarMateriais()
carregarMatricula()

</script>

</body>
</html>
