<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#020617;
color:white;
font-family:Arial;
}

.card{
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}
</style>

</head>

<body class="p-4">

<h3>📚 Materiais Disponíveis</h3>

<div id="materiais"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

async function carregarMateriais(){

const snap = await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(doc => {

const m = doc.data()

html += `
<div class="card p-3 mb-2">
<b>${m.titulo}</b> - ${m.materia}<br>
${m.data}<br>

<button class="btn btn-success btn-sm" onclick="baixar('${m.url}')">
⬇ Baixar
</button>
</div>
`
})

document.getElementById("materiais").innerHTML = html
}

// 🔥 FUNÇÃO DOWNLOAD (ESSA É A MAIS SEGURA)
window.baixar = (url) => {
const link = document.createElement("a")
link.href = url
link.target = "_blank"
link.click()
}

carregarMateriais()

</script>

</body>
</html>
