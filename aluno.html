<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f1f5f9;
}
.card{
  border-radius:12px;
}
</style>

</head>

<body class="container mt-4">

<div id="login">

<h3 class="mb-3">🎓 Área do Aluno</h3>

<input id="user" class="form-control mb-2" placeholder="Usuário">
<input id="pass" type="password" class="form-control mb-2" placeholder="Senha">

<button class="btn btn-success w-100" onclick="login()">Entrar</button>

</div>

<div id="painel" style="display:none">

<h4 id="nomeAluno"></h4>
<p id="turmaAluno"></p>

<div id="materiais"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

let aluno=null

window.login = async ()=>{

const u=user.value
const p=pass.value

const snap=await getDocs(collection(db,"usuarios"))

snap.forEach(d=>{
const a=d.data()
if(a.usuario===u && a.senha==p){
aluno=a
}
})

if(!aluno){
alert("Login inválido")
return
}

login.style.display="none"
painel.style.display="block"

nomeAluno.innerText="Olá, "+aluno.nome
turmaAluno.innerText="Turma: "+aluno.turma

carregarMateriais()
}

async function carregarMateriais(){

const snap=await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(d=>{
const m=d.data()

if(m.turma==="Ambas" || m.turma===aluno.turma){
html+=`
<div class="card p-3 mb-2">
<b>${m.titulo}</b><br>
<button class="btn btn-primary mt-2" onclick="window.open('${m.url}')">
Baixar material
</button>
</div>`
}
})

materiais.innerHTML=html
}

</script>

</body>
</html>
