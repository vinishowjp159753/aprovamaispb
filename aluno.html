<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área do Aluno - AprovaMaisPB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f7fb;}

.topbar{
display:flex;
justify-content:space-between;
padding:12px;
background:#0d6efd;
color:white;
}

.card{
border-radius:12px;
}

.progresso{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.progresso-bar{
height:8px;
background:#0d6efd;
}

.badge-novo{
background:red;
color:white;
font-size:10px;
padding:3px 6px;
border-radius:6px;
margin-left:5px;
}
</style>

</head>

<body>

<div class="topbar">
<b id="nomeAluno"></b>
<button onclick="logout()" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="container mt-3">

<h5>📚 Seus Materiais</h5>

<div id="continuar" class="mb-3"></div>

<div id="materiais"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

/* 🔒 PEGAR SESSÃO */
const aluno = JSON.parse(localStorage.getItem("aluno"))

if(!aluno){
alert("Faça login novamente")
window.location.href="index.html"
}

document.getElementById("nomeAluno").innerText = aluno.nome

/* 📊 PROGRESSO LOCAL */
let progresso = JSON.parse(localStorage.getItem("progresso_"+aluno.usuario)) || {}

/* 📚 CARREGAR MATERIAIS */
async function carregar(){

const snap = await getDocs(collection(db,"materiais"))

let html=""
let total=0
let vistos=0
let ultimo=null

snap.forEach(doc=>{

const m = doc.data()
const id = doc.id

if(m.turma === aluno.turma || m.turma === "Ambas"){

total++

const visto = progresso[id]

if(visto){
vistos++
ultimo = m
}

html+=`
<div class="card p-3 mb-2">

<b>${m.titulo}
${!visto ? '<span class="badge-novo">NOVO</span>' : ''}
</b><br>

<small>${m.materia}</small><br>

<button class="btn btn-primary btn-sm mt-2" onclick="abrir('${m.url}','${id}')">
Abrir Material
</button>

</div>
`
}

})

/* CONTINUAR */
if(ultimo){
document.getElementById("continuar").innerHTML=`
<div class="card p-2">
<b>▶️ Continuar de onde parou</b><br>
${ultimo.titulo}
<button class="btn btn-success btn-sm mt-2" onclick="window.open('${ultimo.url}')">
Continuar
</button>
</div>
`
}

/* PROGRESSO */
const porcentagem = total ? Math.floor((vistos/total)*100) : 0

html = `
<div class="mb-3">
<b>Seu progresso: ${porcentagem}%</b>
<div class="progresso">
<div class="progresso-bar" style="width:${porcentagem}%"></div>
</div>
</div>
` + html

document.getElementById("materiais").innerHTML = html

}

carregar()

/* ABRIR MATERIAL */
window.abrir = (url,id)=>{

progresso[id]=true

localStorage.setItem("progresso_"+aluno.usuario, JSON.stringify(progresso))

window.open(url)

carregar()
}

/* LOGOUT */
window.logout = ()=>{
localStorage.removeItem("aluno")
window.location.href="index.html"
}

</script>

</body>
</html>
