<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#020617;color:white;}
.card{background:#1e293b;border-radius:12px;}
</style>
</head>

<body class="container mt-4">

<div id="login">

<h3>🎓 Área do Aluno</h3>

<input id="user" class="form-control mb-2" placeholder="Usuário">
<input id="pass" class="form-control mb-2" placeholder="Senha">

<button class="btn btn-success" onclick="login()">Entrar</button>

</div>

<div id="painel" style="display:none">

<h3 id="nomeAluno"></h3>
<p id="turmaAluno"></p>

<div id="materiais"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"SUA KEY",
authDomain:"SEU DOMINIO",
projectId:"SEU ID"
});

const db = getFirestore(app);

let aluno=null

window.login = async ()=>{

const u=user.value
const p=pass.value

const snap=await getDocs(collection(db,"usuarios"))

snap.forEach(d=>{
const a=d.data()

if(a.usuario===u && a.senha==p){
aluno=a
}
})

if(!aluno){
alert("Login inválido")
return
}

login.style.display="none"
painel.style.display="block"

nomeAluno.innerText="Olá, "+aluno.nome
turmaAluno.innerText="Turma: "+aluno.turma

carregarMateriais()
}

async function carregarMateriais(){

const snap=await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(d=>{
const m=d.data()

if(m.turma==="Ambas" || m.turma===aluno.turma){

html+=`
<div class="card p-2 mb-2">
<b>${m.titulo}</b><br>
<button onclick="window.open('${m.url}')">Baixar</button>
</div>`
}
})

materiais.innerHTML=html
}

</script>

</body>
</html>
