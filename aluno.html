<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fa;
font-family:Arial;
}

.header{
background:#2563eb;
color:white;
padding:30px;
text-align:center;
}

.material{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div class="header">
<h2>Portal do Aluno</h2>
</div>

<div class="container mt-4">

<h4>Materiais de Estudo</h4>

<div id="listaMateriais"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain: "aprovamaispb2-3bc78.firebaseapp.com",
projectId: "aprovamaispb2-3bc78",
storageBucket: "aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId: "830264910104",
appId: "1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId: "G-PM06K116GT"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function carregarMateriais(){

const querySnapshot = await getDocs(collection(db,"materiais"))

const lista = document.getElementById("listaMateriais")

querySnapshot.forEach(doc => {

const m = doc.data()

lista.innerHTML += `

<div class="material">

<div>

<strong>${m.titulo}</strong>
<br>
${m.materia}

</div>

<a href="${m.link}" target="_blank" class="btn btn-success">
Baixar
</a>

</div>

`

})

}

carregarMateriais()

</script>

</body>
</html>
