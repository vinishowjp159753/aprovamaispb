<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:Arial;
}

.sidebar{
width:230px;
height:100vh;
background:#0f172a;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.content{
margin-left:250px;
padding:30px;
}

.card{
background:#1e293b;
border:none;
border-radius:12px;
color:white;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>🎓 Aluno</h4>

<button class="btn btn-light" onclick="mostrar('materiais')">Materiais</button>
<button class="btn btn-light" onclick="mostrar('matricula')">Minha Matrícula</button>

<button class="btn btn-danger mt-3" onclick="logout()">Sair</button>

</div>

<div class="content">

<!-- MATERIAIS -->

<div id="materiais">

<h3>📚 Materiais</h3>

<input id="busca" class="form-control mb-2" placeholder="Buscar material...">

<select id="filtro" class="form-control mb-3">
<option value="">Todas matérias</option>
<option>Matemática</option>
<option>Português</option>
<option>História</option>
</select>

<div id="lista" class="row"></div>

</div>

<!-- MATRÍCULA -->

<div id="matricula" style="display:none">

<h3>📄 Minha Matrícula</h3>

<div id="dados"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

const usuario = localStorage.getItem("usuario")

if(!usuario){
location="index.html"
}

window.logout = ()=>{
localStorage.clear()
location="index.html"
}

window.mostrar = (sec)=>{
["materiais","matricula"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(sec).style.display="block"
}

let materiaisGlobal = []

// CARREGAR MATERIAIS
async function carregarMateriais(){

const snap = await getDocs(collection(db,"materiais"))

materiaisGlobal = []

snap.forEach(doc=>{
materiaisGlobal.push(doc.data())
})

render()

}

// RENDER
function render(){

const busca = document.getElementById("busca").value.toLowerCase()
const filtro = document.getElementById("filtro").value

let html=""

materiaisGlobal
.filter(m => m.titulo.toLowerCase().includes(busca))
.filter(m => !filtro || m.materia === filtro)
.forEach(m => {

html+=`
<div class="col-md-4 mb-3">

<div class="card p-3">

<h5>${m.titulo}</h5>
<p>${m.materia} | ${m.data}</p>

<button class="btn btn-primary btn-sm" onclick="verPDF('${m.url}')">
Visualizar
</button>

<a href="${m.url}" target="_blank" class="btn btn-success btn-sm mt-2">
Baixar
</a>

<div id="preview"></div>

</div>

</div>
`
})

document.getElementById("lista").innerHTML = html

}

// PREVIEW PDF
window.verPDF = (url)=>{

document.getElementById("lista").innerHTML += `
<div class="card p-3 mt-3">
<h5>Visualização</h5>
<iframe src="${url}"></iframe>
</div>
`

}

// CARREGAR ALUNO
async function carregarAluno(){

const snap = await getDocs(collection(db,"usuarios"))

snap.forEach(doc=>{

const a = doc.data()

if(a.usuario === usuario){

const hoje = new Date()
const fim = new Date(a.fim)

const dias = Math.ceil((fim-hoje)/(1000*60*60*24))

if(dias <= 0){

document.body.innerHTML = `
<div class="container text-center mt-5">
<h1>❌ Matrícula expirada</h1>
<p>Procure a coordenação</p>
</div>
`

return
}

document.getElementById("dados").innerHTML = `

<div class="card p-4">

<h4>${a.nome}</h4>

<p><b>Matrícula:</b> ${a.matricula}</p>
<p><b>Telefone:</b> ${a.telefone}</p>
<p><b>Pagamento:</b> ${a.pagamento}</p>

<p><b>Validade:</b> ${a.fim}</p>
<p><b>Dias restantes:</b> ${dias}</p>

</div>

`

}

})

}

// EVENTOS
document.getElementById("busca").addEventListener("input", render)
document.getElementById("filtro").addEventListener("change", render)

carregarMateriais()
carregarAluno()

</script>

</body>
</html>
