<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Painel do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
font-family:Arial;
}

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
color:white;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.content{
margin-left:240px;
padding:30px;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>🎓 AprovaMaisPB</h4>

<button class="btn btn-light" onclick="mostrar('materiais')">
Materiais
</button>

<button class="btn btn-light" onclick="mostrar('matricula')">
Minha Matrícula
</button>

<button onclick="logout()" class="btn btn-danger mt-3">
Sair
</button>

</div>

<div class="content">

<div id="materiais">

<h3>Materiais</h3>

<div id="listaMateriais"></div>

</div>

<div id="matricula" style="display:none">

<h3>Minha Matrícula</h3>

<div id="dadosAluno"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78",
storageBucket:"aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId:"830264910104",
appId:"1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId:"G-PM06K116GT"

}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const usuario=localStorage.getItem("usuario")

window.logout=function(){

localStorage.clear()
window.location="index.html"

}

window.mostrar=function(sec){

document.getElementById("materiais").style.display="none"
document.getElementById("matricula").style.display="none"

document.getElementById(sec).style.display="block"

}

async function carregarAluno(){

const snap=await getDocs(collection(db,"usuarios"))

snap.forEach(docu=>{

const a=docu.data()

if(a.usuario===usuario){

const hoje=new Date()
const fim=new Date(a.fim)

const diff=Math.ceil((fim-hoje)/(1000*60*60*24))

document.getElementById("dadosAluno").innerHTML=`

<div class="card p-4">

<b>Nome:</b> ${a.nome}<br><br>

<b>Telefone:</b> ${a.telefone}<br><br>

<b>Matrícula:</b> ${a.matricula}<br><br>

<b>Início:</b> ${a.inicio}<br><br>

<b>Fim:</b> ${a.fim}<br><br>

<b>Forma de pagamento:</b> ${a.pagamento}<br><br>

<b>Dias restantes:</b>

<span class="badge bg-success">

${diff} dias

</span>

</div>

`

}

})

}

async function carregarMateriais(){

const snap=await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(docu=>{

const m=docu.data()

html+=`

<div class="card p-3 mb-3">

<b>${m.titulo}</b>

<br>

${m.materia}

<br><br>

<a href="${m.url}" target="_blank" class="btn btn-primary">

Baixar material

</a>

</div>

`

})

document.getElementById("listaMateriais").innerHTML=html

}

carregarAluno()
carregarMateriais()

</script>

</body>
</html>
