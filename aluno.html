<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno - AprovaMaisPB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f1f5f9; font-family:Arial, sans-serif; margin:0; padding:0; }
.topbar { display:flex; justify-content:space-between; align-items:center; padding:12px; background:#0d6efd; color:white; }
.container { padding:15px; }
.card { border-radius:12px; margin-bottom:10px; }
h3 { margin-bottom:15px; }
select, input { margin-bottom:10px; }
.btn { margin-right:5px; margin-top:5px; }
@media(max-width:600px){
  .topbar { flex-direction:column; text-align:center; gap:8px; }
}
</style>
</head>
<body>

<div class="topbar">
  <b>🎓 AprovaMaisPB - Portal do Aluno</b>
  <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
</div>

<div class="container">

<h3>📚 Materiais Disponíveis</h3>

<div class="mb-3">
  <label>Filtrar por turma:</label>
  <select id="filtroTurma" class="form-control" onchange="carregarMateriais()">
    <option value="">Todas</option>
    <option value="Semanal">Extensivo Semanal</option>
    <option value="Sabado">Extensivo Sábado</option>
  </select>
</div>

<div class="mb-3">
  <label>Filtrar por disciplina:</label>
  <select id="filtroMateria" class="form-control" onchange="carregarMateriais()">
    <option value="">Todas</option>
    <option>Redação</option>
    <option>Matemática</option>
    <option>Química</option>
    <option>Física</option>
    <option>Biologia</option>
    <option>Sociologia</option>
    <option>Filosofia</option>
    <option>Literatura</option>
    <option>Gramática</option>
    <option>Inglês</option>
    <option>Espanhol</option>
  </select>
</div>

<div id="listaMateriais"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
  authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
  projectId:"aprovamaispb2-3bc78"
});
const db = getFirestore(app);

// MOCK: informações do aluno logado (no login real, use localStorage ou sessão)
const aluno = {
  nome: localStorage.getItem("nome") || "Aluno",
  turma: localStorage.getItem("turma") || ""
};

// LOGOUT
window.logout = () => {
  localStorage.clear();
  location="index.html";
}

// BAIXAR MATERIAL
window.baixar = (url, nome="material.pdf") => {
  const link = document.createElement("a");
  link.href = url;
  link.download = nome;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// CARREGAR MATERIAIS
async function carregarMateriais(){
  const filtroTurma = document.getElementById("filtroTurma").value;
  const filtroMateria = document.getElementById("filtroMateria").value;

  const snap = await getDocs(collection(db,"materiais"));
  let html="";

  snap.forEach(d=>{
    const m = d.data();
    // filtrar por turma do aluno
    if(aluno.turma !== "Semanal" && aluno.turma !== "Sabado") return;
    if(m.turma !== "Ambas" && m.turma !== aluno.turma) return;
    if(filtroTurma && m.turma !== filtroTurma) return;
    if(filtroMateria && m.materia !== filtroMateria) return;

    html+=`
    <div class="card p-3">
      <b>${m.titulo}</b><br>
      <small>${m.materia} - ${m.turma}</small><br><br>
      <button class="btn btn-success btn-sm" onclick="baixar('${m.url}','${m.nomeArquivo}')">⬇ Baixar</button>
    </div>`;
  });

  document.getElementById("listaMateriais").innerHTML = html || "<p>Nenhum material encontrado.</p>";
}

carregarMateriais();
</script>

</body>
</html>
