<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel PRO - AprovaMaisPB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f1f5f9; font-family:Arial, sans-serif; }
.topbar { display:flex; justify-content:space-between; padding:12px; background:#0d6efd; color:white; }
.menu { display:flex; gap:10px; padding:10px; overflow:auto; background:white; }
.card { border-radius:12px; }
</style>
</head>
<body>

<div class="topbar">
  <b>🎓 AprovaMaisPB</b>
  <button onclick="logout()" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="menu">
  <button class="btn btn-outline-primary" onclick="mostrar('cadastro')">Cadastro</button>
  <button class="btn btn-outline-primary" onclick="mostrar('lista')">Alunos</button>
  <button class="btn btn-outline-primary" onclick="mostrar('materiais')">Materiais</button>
</div>

<div class="container mt-3">

<!-- CADASTRO -->
<div id="cadastro">
  <div class="card p-3">
    <input id="nome" class="form-control mb-2" placeholder="Nome">
    <input id="telefone" class="form-control mb-2" placeholder="Telefone">
    <select id="turma" class="form-control mb-2">
      <option value="Semanal">Extensivo Semanal</option>
      <option value="Sabado">Extensivo Sábado</option>
    </select>
    <button class="btn btn-success w-100" onclick="criarAluno()">Cadastrar</button>
    <div id="credencial"></div>
  </div>
</div>

<!-- ALUNOS -->
<div id="lista" style="display:none">
  <input id="busca" class="form-control mb-2" placeholder="Buscar..." onkeyup="carregarAlunos()">
  <div class="mb-2">
    <button class="btn btn-secondary btn-sm" onclick="filtroTurma('')">Todos</button>
    <button class="btn btn-secondary btn-sm" onclick="filtroTurma('Semanal')">Semanal</button>
    <button class="btn btn-secondary btn-sm" onclick="filtroTurma('Sabado')">Sábado</button>
  </div>
  <div id="tabela"></div>
</div>

<!-- MATERIAIS -->
<div id="materiais" style="display:none">
  <div class="card p-3 mb-3">
    <input id="titulo" class="form-control mb-2" placeholder="Título">
    <select id="materia" class="form-control mb-2">
      <option>Matemática</option>
      <option>Português</option>
      <option>História</option>
    </select>
    <select id="turmaMaterial" class="form-control mb-2">
      <option value="Semanal">Semanal</option>
      <option value="Sabado">Sábado</option>
      <option value="Ambas">Ambas</option>
    </select>
    <input id="linkDrive" class="form-control mb-2" placeholder="Link do Drive">
    <button class="btn btn-primary w-100" onclick="salvarLink()">Salvar Material</button>
  </div>
  <div id="listaMateriais"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
  authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
  projectId:"aprovamaispb2-3bc78"
});
const db = getFirestore(app);

window.logout = ()=> location="index.html";
window.mostrar = sec => { ["cadastro","lista","materiais"].forEach(id=>document.getElementById(id).style.display="none"); document.getElementById(sec).style.display="block" }

function gerarMatricula(){ return "AP"+Math.floor(10000 + Math.random()*90000) }
function gerarSenha(){ return Math.random().toString(36).substring(2,8) }

let turmaFiltro=""
window.filtroTurma = t=>{ turmaFiltro=t; carregarAlunos() }

window.criarAluno = async ()=>{
  const nome=document.getElementById("nome").value
  const telefone=document.getElementById("telefone").value
  const turma=document.getElementById("turma").value
  if(!nome || !telefone){ alert("Preencha os campos"); return }

  const usuario = gerarMatricula()
  const senha = gerarSenha()

  await addDoc(collection(db,"usuarios"),{
    nome, telefone, turma, usuario, senha, matricula: usuario, tipo:"aluno"
  })

  document.getElementById("credencial").innerHTML = `
  <div class="alert alert-success mt-2">
  <b>Aluno cadastrado!</b><br>
  Usuário: ${usuario}<br>
  Senha: ${senha}
  </div>`

  carregarAlunos()
}

async function carregarAlunos(){
  const busca=document.getElementById("busca").value.toLowerCase()
  const snap = await getDocs(collection(db,"usuarios"))
  let html=""
  snap.forEach(d=>{
    const a=d.data()
    if(a.tipo==="aluno"){
      if(turmaFiltro && a.turma!==turmaFiltro) return
      if(!a.nome.toLowerCase().includes(busca)) return
      html+=`
      <div class="card p-2 mb-2">
        <b>${a.nome}</b> (${a.turma})<br>
        <button class="btn btn-info btn-sm mt-2" onclick="ver('${a.usuario}','${a.senha}')">Ver acesso</button>
        <button class="btn btn-success btn-sm mt-2" onclick="zap('${a.usuario}','${a.senha}','${a.telefone}')">WhatsApp</button>
        <button class="btn btn-warning btn-sm mt-2" onclick="editar(this)"
          data-id="${d.id}" data-nome="${a.nome}" data-telefone="${a.telefone}" data-turma="${a.turma}" data-senha="${a.senha}">Editar</button>
        <button class="btn btn-danger btn-sm mt-2" onclick="del('${d.id}')">Excluir</button>
      </div>`
    }
  })
  document.getElementById("tabela").innerHTML=html
}

window.ver = (usuario, senha)=> alert(`Usuário: ${usuario}\nSenha: ${senha}`)
window.zap = (usuario, senha, tel)=>{
  const msg=`🎓 AprovaMaisPB\nUsuário: ${usuario}\nSenha: ${senha}\nAcesse: https://aprovamaispb.com.br\nClique em Área do Aluno`
  window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`)
}

window.editar = async btn=>{
  const id=btn.dataset.id
  const nomeAtual=btn.dataset.nome
  const telAtual=btn.dataset.telefone
  const turmaAtual=btn.dataset.turma
  const senhaAtual=btn.dataset.senha

  const nome = prompt("Editar nome:", nomeAtual); if(nome===null) return
  const telefone = prompt("Editar telefone:", telAtual); if(telefone===null) return
  const turma = prompt("Editar turma (Semanal ou Sabado):", turmaAtual); if(turma===null) return
  const senha = prompt("Editar senha:", senhaAtual); if(senha===null) return

  await updateDoc(doc(db,"usuarios",id),{nome, telefone, turma, senha})
  alert("Aluno atualizado!")
  carregarAlunos()
}

window.del = async id => { await deleteDoc(doc(db,"usuarios",id)); carregarAlunos() }

window.salvarLink = async ()=>{
  const titulo=document.getElementById("titulo").value
  const materia=document.getElementById("materia").value
  const turma=document.getElementById("turmaMaterial").value
  let url=document.getElementById("linkDrive").value
  if(!url){ alert("Cole o link do Drive"); return }
  if(url.includes("drive")){ const id=url.split("/d/")[1]?.split("/")[0]; url=`https://drive.google.com/uc?export=download&id=${id}` }
  await addDoc(collection(db,"materiais"),{titulo,materia,turma,url,nomeArquivo:titulo+".pdf",data:new Date().toLocaleDateString()})
  alert("Material salvo!")
  document.getElementById("titulo").value=""; document.getElementById("linkDrive").value=""
}

carregarAlunos()
</script>
</body>
</html>
