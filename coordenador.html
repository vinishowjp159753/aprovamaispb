<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel PRO - AprovaMaisPB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  <link rel="icon" type="image/png" href="assets/img/logo_aprovamaispb.png">
body{ background:#020617; color:white; font-family:Arial; }

.sidebar{
  width:230px;
  height:100vh;
  background:#0f172a;
  position:fixed;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
}

.content{
  margin-left:250px;
  padding:30px;
}

.card{
  background:#1e293b;
  border:none;
  border-radius:12px;
  color:white;
}

input, select{
  background:#020617 !important;
  color:white !important;
  border:1px solid #334155 !important;
}
</style>

</head>

<body>

<div class="sidebar">
<h4>🚀 AprovaMaisPB</h4>

<button class="btn btn-light" onclick="mostrar('cadastro')">Cadastrar Aluno</button>
<button class="btn btn-light" onclick="mostrar('lista')">Alunos</button>
<button class="btn btn-light" onclick="mostrar('materiais')">Materiais</button>

<button onclick="logout()" class="btn btn-danger mt-3">Sair</button>
</div>

<div class="content">

<!-- CADASTRO -->
<div id="cadastro">
<h3>👨‍🎓 Cadastro de Aluno</h3>

<div class="card p-4">

<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="telefone" class="form-control mb-2" placeholder="Telefone (com DDD)">

<label>Início</label>
<input type="date" id="inicio" class="form-control mb-2">

<label>Fim</label>
<input type="date" id="fim" class="form-control mb-2">

<select id="pagamento" class="form-control mb-3">
<option>pix</option>
<option>dinheiro</option>
<option>cartao</option>
</select>

<button class="btn btn-success" onclick="criarAluno()">Cadastrar</button>

<div id="credencial"></div>

</div>
</div>

<!-- LISTA -->
<div id="lista" style="display:none">
<h3>📋 Alunos</h3>
<div id="tabela"></div>
</div>

<!-- MATERIAIS PRO -->
<div id="materiais" style="display:none">
<h3>📚 Materiais</h3>

<div class="card p-3 mb-3">

<input id="titulo" class="form-control mb-2" placeholder="Título">

<select id="materia" class="form-control mb-2">
<option>Matemática</option>
<option>Português</option>
<option>História</option>
</select>

<input id="linkDrive" class="form-control mb-2" placeholder="Cole o link do Google Drive">

<button class="btn btn-primary" onclick="salvarLink()">Salvar Material</button>

</div>

<!-- FILTRO -->
<select id="filtroMateria" class="form-control mb-3" onchange="carregarMateriais()">
<option value="">Todas matérias</option>
<option>Matemática</option>
<option>Português</option>
<option>História</option>
</select>

<div id="listaMateriais"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

// LOGOUT
window.logout = () => {
localStorage.clear()
location="index.html"
}

// MENU
window.mostrar = (sec)=>{
["cadastro","lista","materiais"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(sec).style.display="block"
}

// GERAR SENHA
function gerarSenha(){
return Math.floor(100000 + Math.random()*900000)
}

// GERAR MATRÍCULA
function gerarMatricula(){
return "AP"+Date.now()
}

// CRIAR ALUNO
window.criarAluno = async ()=>{

const nome = document.getElementById("nome").value
const telefone = document.getElementById("telefone").value
const inicio = document.getElementById("inicio").value
const fim = document.getElementById("fim").value
const pagamento = document.getElementById("pagamento").value

const usuario = nome.toLowerCase().replaceAll(" ","")
const senha = gerarSenha()
const matricula = gerarMatricula()

await addDoc(collection(db,"usuarios"),{
nome, telefone, inicio, fim, pagamento,
usuario, senha, matricula, tipo:"aluno"
})

document.getElementById("credencial").innerHTML=`
<div class="alert alert-success mt-3">
Usuário: ${usuario}<br>
Senha: ${senha}<br>
Matrícula: ${matricula}<br><br>

<button class="btn btn-info" onclick="enviar('${usuario}','${senha}','${telefone}')">
Enviar acesso via WhatsApp
</button>
</div>`

carregarAlunos()
}

// WHATSAPP
window.enviar = (user,pass,telefone)=>{
const numero = telefone.replace(/\D/g,"")

const msg = `🎓 AprovaMaisPB

Usuário: ${user}
Senha: ${pass}

https://aprovamaispb.com.br/login`

const url = `https://wa.me/55${numero}?text=${encodeURIComponent(msg)}`
window.open(url, "_blank")
}

// LISTAR ALUNOS
async function carregarAlunos(){

const snap = await getDocs(collection(db,"usuarios"))

let html = "<table class='table table-dark'><tr><th>Nome</th><th>Ação</th></tr>"

snap.forEach(d=>{
const a = d.data()

if(a.tipo==="aluno"){
html+=`
<tr>
<td>${a.nome}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="del('${d.id}')">Excluir</button>
</td>
</tr>`
}
})

html+="</table>"

document.getElementById("tabela").innerHTML = html
}

// EXCLUIR ALUNO
window.del = async(id)=>{
await deleteDoc(doc(db,"usuarios",id))
carregarAlunos()
}

// DOWNLOAD DIRETO
window.baixar = (url, nome="material.pdf") => {
const link = document.createElement("a")
link.href = url
link.download = nome
document.body.appendChild(link)
link.click()
document.body.removeChild(link)
}

// COPIAR LINK
window.copiar = (url)=>{
navigator.clipboard.writeText(url)
alert("Link copiado!")
}

// SALVAR MATERIAL (DRIVE)
window.salvarLink = async ()=>{

const titulo = document.getElementById("titulo").value
const materia = document.getElementById("materia").value
let url = document.getElementById("linkDrive").value

if(!url){
alert("Cole o link do Drive")
return
}

// converter link
if(url.includes("drive.google.com")){
const id = url.split("/d/")[1]?.split("/")[0]
if(id){
url = `https://drive.google.com/uc?export=download&id=${id}`
}
}

await addDoc(collection(db,"materiais"),{
titulo,
materia,
url,
nomeArquivo: titulo + ".pdf",
data: new Date().toLocaleDateString()
})

alert("Material salvo com sucesso")

document.getElementById("titulo").value=""
document.getElementById("linkDrive").value=""

carregarMateriais()
}

// LISTAR MATERIAIS
async function carregarMateriais(){

const filtro = document.getElementById("filtroMateria").value
const snap = await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(d=>{
const m = d.data()

if(filtro && m.materia !== filtro) return

html+=`
<div class="card p-3 mb-2">

<b>${m.titulo}</b> - ${m.materia}<br>
${m.data}<br><br>

<button class="btn btn-success btn-sm" onclick="baixar('${m.url}','${m.nomeArquivo}')">
⬇ Baixar
</button>

<button class="btn btn-secondary btn-sm" onclick="copiar('${m.url}')">
📋 Copiar Link
</button>

<button class="btn btn-danger btn-sm" onclick="delMat('${d.id}')">
Excluir
</button>

</div>`
})

document.getElementById("listaMateriais").innerHTML = html
}

// EXCLUIR MATERIAL
window.delMat = async(id)=>{
await deleteDoc(doc(db,"materiais",id))
carregarMateriais()
}

carregarAlunos()
carregarMateriais()

</script>

</body>
</html>
