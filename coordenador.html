<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Coordenador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#020617;color:white;font-family:Arial;}
.sidebar{width:230px;height:100vh;background:#0f172a;position:fixed;padding:20px;}
.sidebar button{width:100%;margin-bottom:10px;}
.content{margin-left:250px;padding:30px;}
.card{background:#1e293b;border:none;border-radius:12px;color:white;}
</style>

</head>

<body>

<div class="sidebar">
<h4>🚀 AprovaMaisPB</h4>
<button class="btn btn-light" onclick="mostrar('materiais')">Materiais</button>
</div>

<div class="content">

<div id="materiais">

<h3>📚 Materiais</h3>

<div class="card p-3 mb-3">

<input id="titulo" class="form-control mb-2" placeholder="Título">

<select id="materia" class="form-control mb-2">
<option>Matemática</option>
<option>Português</option>
<option>História</option>
</select>

<input id="link" class="form-control mb-2" placeholder="Cole o link do Google Drive">

<button class="btn btn-primary" onclick="salvarMaterial()">Salvar</button>

</div>

<div id="listaMateriais"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app);

// MENU
window.mostrar = (sec)=>{
document.getElementById("materiais").style.display="block"
}

// SALVAR MATERIAL (LINK DRIVE)
window.salvarMaterial = async ()=>{

const titulo = document.getElementById("titulo").value
const materia = document.getElementById("materia").value
let url = document.getElementById("link").value

if(!titulo || !url){
alert("Preencha tudo")
return
}

// 🔥 converter link automaticamente
if(url.includes("/file/d/")){
  const id = url.split("/file/d/")[1].split("/")[0]
  url = `https://drive.google.com/uc?export=download&id=${id}`
}

await addDoc(collection(db,"materiais"),{
titulo,
materia,
url,
data:new Date().toLocaleDateString()
})

alert("Material cadastrado")

carregarMateriais()
}

// LISTAR
async function carregarMateriais(){

const snap = await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(d=>{
const m = d.data()

html+=`
<div class="card p-3 mb-2">
<b>${m.titulo}</b> - ${m.materia}<br>
${m.data}<br>

<a href="${m.url}" target="_blank" class="btn btn-success btn-sm">
⬇ Baixar
</a>

<button class="btn btn-danger btn-sm" onclick="delMat('${d.id}')">
Excluir
</button>
</div>
`
})

document.getElementById("listaMateriais").innerHTML = html
}

// EXCLUIR
window.delMat = async(id)=>{
await deleteDoc(doc(db,"materiais",id))
carregarMateriais()
}

carregarMateriais()

</script>

</body>
</html>
