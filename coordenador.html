<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{color:white!important;}
body{background:#020617;font-family:Arial;}

.topbar{display:flex;justify-content:space-between;padding:10px;background:#0f172a;}
.menu-mobile{display:flex;gap:5px;padding:10px;overflow:auto;}
.card{background:#1e293b;border-radius:12px;}

input,select{background:#020617!important;border:1px solid #334155!important;}

</style>
</head>

<body>

<div class="topbar">
<b>AprovaMaisPB</b>
<button onclick="logout()" class="btn btn-danger btn-sm">Sair</button>
</div>

<div class="menu-mobile">
<button class="btn btn-light" onclick="mostrar('cadastro')">Cadastro</button>
<button class="btn btn-light" onclick="mostrar('lista')">Alunos</button>
<button class="btn btn-light" onclick="mostrar('materiais')">Materiais</button>
</div>

<div class="container mt-3">

<!-- CADASTRO -->
<div id="cadastro">
<div class="card p-3">

<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="telefone" class="form-control mb-2" placeholder="Telefone">

<select id="turma" class="form-control mb-2">
<option value="Semanal">Extensivo Semanal</option>
<option value="Sabado">Extensivo Sábado</option>
</select>

<button class="btn btn-success" onclick="criarAluno()">Cadastrar</button>

<div id="credencial"></div>
</div>
</div>

<!-- ALUNOS -->
<div id="lista" style="display:none">

<input id="busca" class="form-control mb-2" placeholder="Buscar..." onkeyup="carregarAlunos()">

<button class="btn btn-light btn-sm" onclick="filtroTurma('')">Todos</button>
<button class="btn btn-light btn-sm" onclick="filtroTurma('Semanal')">Semanal</button>
<button class="btn btn-light btn-sm" onclick="filtroTurma('Sabado')">Sábado</button>

<div id="tabela"></div>
</div>

<!-- MATERIAIS -->
<div id="materiais" style="display:none">

<div class="card p-3 mb-3">

<input id="titulo" class="form-control mb-2" placeholder="Título">

<select id="materia" class="form-control mb-2">
<option>Redação</option>
<option>Matemática</option>
<option>Química</option>
<option>Física</option>
<option>Biologia</option>
<option>Sociologia</option>
<option>Filosofia</option>
<option>Literatura</option>
<option>Gramática</option>
<option>Inglês</option>
<option>Espanhol</option>
</select>

<select id="turmaMaterial" class="form-control mb-2">
<option value="Semanal">Semanal</option>
<option value="Sabado">Sábado</option>
<option value="Ambas">Ambas</option>
</select>

<input id="linkDrive" class="form-control mb-2" placeholder="Link Drive">

<button class="btn btn-primary" onclick="salvarLink()">Salvar</button>

</div>

<div id="listaMateriais"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"SUA KEY",
authDomain:"SEU DOMINIO",
projectId:"SEU ID"
});

const db = getFirestore(app);

window.mostrar = sec=>{
["cadastro","lista","materiais"].forEach(id=>document.getElementById(id).style.display="none")
document.getElementById(sec).style.display="block"
}

let turmaFiltro=""

window.filtroTurma = t=>{
turmaFiltro=t
carregarAlunos()
}

window.criarAluno = async ()=>{
const nome=nome.value
const telefone=telefone.value
const turma=turma.value

const usuario=nome.toLowerCase().replaceAll(" ","")
const senha=Math.floor(100000+Math.random()*900000)

await addDoc(collection(db,"usuarios"),{
nome,telefone,turma,usuario,senha,tipo:"aluno"
})

alert("Criado!")
carregarAlunos()
}

async function carregarAlunos(){
const busca=busca.value.toLowerCase()
const snap=await getDocs(collection(db,"usuarios"))

let html=""

snap.forEach(d=>{
const a=d.data()

if(a.tipo==="aluno"){
if(turmaFiltro && a.turma!==turmaFiltro) return
if(!a.nome.toLowerCase().includes(busca)) return

html+=`
<div class="card p-2 mb-2">
<b>${a.nome}</b> (${a.turma})<br>

<button onclick="ver('${a.usuario}','${a.senha}')">Ver</button>
<button onclick="zap('${a.usuario}','${a.senha}','${a.telefone}')">Whats</button>
<button onclick="editar('${d.id}','${a.nome}','${a.telefone}','${a.turma}')">Editar</button>
<button onclick="del('${d.id}')">Excluir</button>
</div>`
}
})

tabela.innerHTML=html
}

window.ver=(u,s)=>alert(`Usuário:${u}\nSenha:${s}`)

window.zap=(u,s,t)=>{
window.open(`https://wa.me/55${t}?text=Login:${u} Senha:${s}`)
}

window.editar=async(id,n,t,tu)=>{
const nome=prompt("Nome",n)
const tel=prompt("Tel",t)
const turma=prompt("Turma",tu)

await updateDoc(doc(db,"usuarios",id),{nome,telefone:tel,turma})
carregarAlunos()
}

window.del=async(id)=>{
await deleteDoc(doc(db,"usuarios",id))
carregarAlunos()
}

window.salvarLink=async()=>{
let url=linkDrive.value

if(url.includes("drive")){
const id=url.split("/d/")[1]?.split("/")[0]
url=`https://drive.google.com/uc?export=download&id=${id}`
}

await addDoc(collection(db,"materiais"),{
titulo:titulo.value,
materia:materia.value,
turma:turmaMaterial.value,
url
})

alert("Salvo")
}

</script>

</body>
</html>
