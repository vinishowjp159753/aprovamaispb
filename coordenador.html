<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Coordenador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
font-family:Arial;
}

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
position:fixed;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:30px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>🎓 AprovaMaisPB</h4>

<button class="btn btn-light" onclick="mostrar('cadastro')">
Cadastrar Aluno
</button>

<button class="btn btn-light" onclick="mostrar('materiais')">
Materiais
</button>

</div>

<div class="content">

<div id="cadastro">

<h3>Cadastrar Aluno</h3>

<div class="card p-4">

<input id="nomeAluno" class="form-control mb-3" placeholder="Nome do aluno">

<button class="btn btn-primary" onclick="criarAluno()">
Criar aluno
</button>

<div id="credencial" class="mt-4"></div>

</div>

</div>

<div id="materiais" style="display:none">

<h3>Enviar Material</h3>

<div class="card p-4">

<input id="titulo" class="form-control mb-2" placeholder="Título">

<select id="materia" class="form-control mb-2">

<option>Matemática</option>
<option>Português</option>
<option>História</option>
<option>Geografia</option>

</select>

<input type="file" id="arquivo" class="form-control mb-3">

<button class="btn btn-success" onclick="uploadMaterial()">
Enviar
</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain: "aprovamaispb2-3bc78.firebaseapp.com",
projectId: "aprovamaispb2-3bc78",
storageBucket: "aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId: "830264910104",
appId: "1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId: "G-PM06K116GT"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.mostrar=function(sec){

document.getElementById("cadastro").style.display="none"
document.getElementById("materiais").style.display="none"

document.getElementById(sec).style.display="block"

}

function gerarSenha(){

return Math.floor(100000 + Math.random()*900000)

}

window.criarAluno = async function(){

const nome=document.getElementById("nomeAluno").value

const usuario = nome.toLowerCase().replaceAll(" ","")

const senha = gerarSenha()

await addDoc(collection(db,"usuarios"),{

nome:nome,
usuario:usuario,
senha:senha,
tipo:"aluno"

})

document.getElementById("credencial").innerHTML=`

<div class="alert alert-success">

<b>Aluno criado!</b>

<br><br>

Usuário: ${usuario}

<br>

Senha: ${senha}

</div>

`

}

window.uploadMaterial = async function(){

const file=document.getElementById("arquivo").files[0]

const storageRef=ref(storage,"materiais/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"materiais"),{

titulo:document.getElementById("titulo").value,
materia:document.getElementById("materia").value,
url:url

})

alert("Material enviado")

}

</script>

</body>
</html>
