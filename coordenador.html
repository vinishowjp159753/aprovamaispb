<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Coordenador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f1f5f9; font-family:Segoe UI; }

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0d6efd;
  color:white;
}

.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.card{
  border:none;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* Estilos para o PDF */
.pdf-container {
  font-family: 'Segoe UI', Arial, sans-serif;
  width: 100%;
  max-width: 210mm;
  margin: 0 auto;
  background: white;
}

.pdf-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #0d6efd;
  padding-bottom: 10px;
  margin-bottom: 15px;
  page-break-inside: avoid;
}

.pdf-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pdf-header-right {
  text-align: right;
}

.logo-pdf {
  width: 60px;
  height: auto;
  object-fit: contain;
}

.pdf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  page-break-inside: auto;
}

.pdf-table tr {
  page-break-inside: avoid;
  page-break-after: auto;
}

.pdf-table th {
  background: #0d6efd;
  color: white;
  padding: 8px;
  font-weight: 600;
  font-size: 12px;
}

.pdf-table td {
  padding: 8px 6px;
  border-bottom: 1px solid #ddd;
  vertical-align: middle;
}

.assinatura-linha {
  border-bottom: 1.5px solid #000;
  height: 25px;
  width: 100%;
  max-width: 140px;
  margin: 0 auto;
}

.pdf-footer {
  margin-top: 20px;
  text-align: center;
  color: #777;
  font-size: 9px;
  page-break-inside: avoid;
  border-top: 1px solid #eee;
  padding-top: 10px;
}

.page-break {
  page-break-before: always;
  margin-top: 20px;
}

/* Ajuste para o conteúdo do PDF */
#listaPresenca {
  background: white;
  padding: 15px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>🎓 AprovaMaisPB</b>
  <button onclick="location='index.html'" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="menu">
  <button class="btn btn-outline-primary" onclick="mostrar('dashboard')">Dashboard</button>
  <button class="btn btn-outline-primary" onclick="mostrar('cadastro')">Cadastro</button>
  <button class="btn btn-outline-primary" onclick="mostrar('lista')">Alunos</button>
  <button class="btn btn-outline-primary" onclick="mostrar('materiais')">Materiais</button>
  <button class="btn btn-outline-primary" onclick="mostrar('presenca')">Presença</button>
</div>

<div class="container mt-3">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="row">
<div class="col-6"><div class="card p-3 text-center"><h6>Total</h6><h3 id="totalAlunos">0</h3></div></div>
<div class="col-6"><div class="card p-3 text-center"><h6>Ativos</h6><h3 id="ativos">0</h3></div></div>
<div class="col-6 mt-2"><div class="card p-3 text-center"><h6>Semanal</h6><h3 id="semanal">0</h3></div></div>
<div class="col-6 mt-2"><div class="card p-3 text-center"><h6>Sábado</h6><h3 id="sabado">0</h3></div></div>
</div>

<div class="card p-3 mt-3">
<h5 class="text-danger">⚠️ Matrículas Vencidas</h5>
<div id="listaVencidos"></div>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none">
<div class="card p-3">
<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="telefone" class="form-control mb-2" placeholder="Telefone">

<select id="turma" class="form-control mb-2">
<option value="Semanal">Semanal</option>
<option value="Sabado">Sabado</option>
</select>

<select id="pagamento" class="form-control mb-2">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="dias" type="number" class="form-control mb-2" placeholder="Dias">

<button class="btn btn-success w-100" onclick="criarAluno()">Cadastrar</button>
</div>
</div>

<!-- ALUNOS -->
<div id="lista" style="display:none">
<input id="busca" class="form-control mb-2" placeholder="Buscar..." onkeyup="carregarAlunos()">
<div id="tabela"></div>
</div>

<!-- MATERIAIS -->
<div id="materiais" style="display:none">

<select id="filtroMaterial" class="form-control mb-2" onchange="carregarMateriais()">
<option value="">Todas</option>
<option value="Semanal">Semanal</option>
<option value="Sabado">Sábado</option>
</select>

<div class="card p-3 mb-3">
<input id="titulo" class="form-control mb-2" placeholder="Título">
<input id="linkDrive" class="form-control mb-2" placeholder="Link do Drive">

<select id="turmaMaterial" class="form-control mb-2">
<option value="Semanal">Semanal</option>
<option value="Sabado">Sabado</option>
<option value="Ambas">Ambas</option>
</select>

<button class="btn btn-primary" onclick="salvarLink()">Salvar</button>
</div>

<div id="listaMateriais"></div>

</div>

<!-- PRESENÇA -->
<div id="presenca" style="display:none">

<select id="turmaPresenca" class="form-control mb-2">
<option value="">Todas</option>
<option value="Semanal">Semanal</option>
<option value="Sabado">Sábado</option>
</select>

<input type="date" id="dataPresenca" class="form-control mb-2">

<button class="btn btn-primary mb-2" onclick="gerarListaPresenca()">Gerar</button>
<button class="btn btn-success mb-2" onclick="window.print()">Imprimir</button>
<button class="btn btn-dark mb-2" onclick="baixarPDF()">Baixar PDF</button>

<div id="listaPresenca"></div>

</div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-body">

        <input id="editNome" class="form-control mb-2">
        <input id="editTelefone" class="form-control mb-2">

        <select id="editTurma" class="form-control mb-2">
          <option value="Semanal">Semanal</option>
          <option value="Sabado">Sábado</option>
        </select>

        <select id="editPagamento" class="form-control mb-2">
          <option>Pix</option>
          <option>Dinheiro</option>
          <option>Cartão</option>
        </select>

        <select id="editStatus" class="form-control mb-2">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>

        <input id="editDias" type="number" class="form-control mb-2" placeholder="Dias">

        <button class="btn btn-warning w-100" onclick="salvarEdicao()">Salvar</button>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
  authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
  projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app)

// ABAS
window.mostrar = (sec)=>{
["dashboard","cadastro","lista","materiais","presenca"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(sec).style.display="block"
}

// DASHBOARD
async function carregarDashboard(){

const snap = await getDocs(collection(db,"usuarios"))

let total=0, ativos=0, semanal=0, sabado=0
let vencidosHTML=""
const hoje=new Date()

snap.forEach(d=>{
const a=d.data()
if(a.tipo!=="aluno") return

total++

let turma=(a.turma||"").toLowerCase()

if(turma.includes("sem")) semanal++
if(turma.includes("sab")) sabado++

let ativo=false

if(a.dataFim){
let fim=new Date(a.dataFim)

if(fim>=hoje) ativo=true
else vencidosHTML+=`<div><b>${a.nome}</b> - ${fim.toLocaleDateString()}</div>`
}else ativo=true

if(a.status==="ativo") ativo=true

if(ativo) ativos++
})

document.getElementById("totalAlunos").innerText=total
document.getElementById("ativos").innerText=ativos
document.getElementById("semanal").innerText=semanal
document.getElementById("sabado").innerText=sabado

document.getElementById("listaVencidos").innerHTML=vencidosHTML||"Nenhuma matrícula vencida 🎉"
}

// ALUNOS
async function carregarAlunos(){

const busca=document.getElementById("busca").value.toLowerCase()
const snap=await getDocs(collection(db,"usuarios"))

// Criar array para armazenar alunos
let alunos = []

snap.forEach(d=>{
const a=d.data()
if(a.tipo!=="aluno") return
if(!(a.nome||"").toLowerCase().includes(busca)) return

// Adicionar aluno ao array com seus dados
alunos.push({
  id: d.id,
  nome: a.nome,
  telefone: a.telefone,
  turma: a.turma,
  pagamento: a.pagamento,
  status: a.status,
  usuario: a.usuario,
  senha: a.senha
})
})

// Ordenar alunos por nome em ordem alfabética
alunos.sort((a, b) => {
  if (a.nome < b.nome) return -1
  if (a.nome > b.nome) return 1
  return 0
})

// Gerar HTML com alunos ordenados
let html = ""
alunos.forEach(a => {
html+=`
<div class="card p-2 mb-2">
<b>${a.nome}</b> (${a.turma})<br>

<button onclick="zap('${a.usuario}','${a.senha}','${a.telefone}')" class="btn btn-success btn-sm">WhatsApp</button>

<button onclick="abrirEditar(this)" class="btn btn-warning btn-sm"
data-id="${a.id}"
data-nome="${a.nome||''}"
data-telefone="${a.telefone||''}"
data-turma="${a.turma||''}"
data-pagamento="${a.pagamento||''}"
data-status="${a.status||'ativo'}">
Editar</button>

<button onclick="renovar('${a.id}','${a.telefone}')" class="btn btn-primary btn-sm">+30d</button>
<button onclick="del('${a.id}')" class="btn btn-danger btn-sm">Excluir</button>
</div>`
})

document.getElementById("tabela").innerHTML = html
}

// EDITAR
let alunoEditandoId=null

window.abrirEditar=(btn)=>{
alunoEditandoId=btn.dataset.id
editNome.value=btn.dataset.nome
editTelefone.value=btn.dataset.telefone
editTurma.value=btn.dataset.turma
editPagamento.value=btn.dataset.pagamento
editStatus.value=btn.dataset.status
new bootstrap.Modal(document.getElementById('modalEditar')).show()
}

window.salvarEdicao=async()=>{
const dias=parseInt(editDias.value)||30
const inicio=new Date()
const fim=new Date()
fim.setDate(inicio.getDate()+dias)

await updateDoc(doc(db,"usuarios",alunoEditandoId),{
nome:editNome.value,
telefone:editTelefone.value,
turma:editTurma.value,
pagamento:editPagamento.value,
status:editStatus.value,
dataInicio:inicio.toISOString(),
dataFim:fim.toISOString()
})

alert("Atualizado!")
carregarAlunos()
carregarDashboard()
bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide()
}

// WHATSAPP
window.zap=(u,s,t)=>{
let msg=`🎓 AprovaMaisPB

Usuário: ${u}
Senha: ${s}

Acesse:
https://aprovamaispb.com.br`
window.open(`https://wa.me/55${t}?text=${encodeURIComponent(msg)}`)
}

// RENOVAR
window.renovar=async(id,t)=>{
const ref=doc(db,"usuarios",id)
const snap=await getDoc(ref)
let fim=new Date(snap.data().dataFim||new Date())
fim.setDate(fim.getDate()+30)
await updateDoc(ref,{dataFim:fim.toISOString()})
window.open(`https://wa.me/55${t}?text=Renovado+30+dias`)
carregarDashboard()
}

// MATERIAIS
window.salvarLink=async()=>{
await addDoc(collection(db,"materiais"),{
titulo:titulo.value,
url:linkDrive.value,
turma:turmaMaterial.value
})
carregarMateriais()
}

async function carregarMateriais(){

const filtro=filtroMaterial.value
const snap=await getDocs(collection(db,"materiais"))

let html=""

snap.forEach(d=>{
const m=d.data()
if(filtro && m.turma!==filtro) return

html+=`
<div class="card p-3 mb-2 d-flex justify-content-between">
<div>
<b>${m.titulo}</b><br>
<span class="badge bg-primary">${m.turma}</span>
</div>
<div>
<a href="${m.url}" target="_blank" class="btn btn-success btn-sm">Baixar</a>
<button onclick="delMat('${d.id}')" class="btn btn-danger btn-sm">Excluir</button>
</div>
</div>`
})

listaMateriais.innerHTML=html||"Nenhum material"
}

window.delMat=async id=>{
await deleteDoc(doc(db,"materiais",id))
carregarMateriais()
}

// Função para formatar data corretamente
function formatarDataBR(dataString) {
  if (!dataString) return "__/__/____"
  
  // Divide a string da data (formato YYYY-MM-DD)
  const partes = dataString.split('-')
  if (partes.length === 3) {
    const ano = partes[0]
    const mes = partes[1]
    const dia = partes[2]
    return `${dia}/${mes}/${ano}`
  }
  return dataString
}

// PRESENÇA
window.gerarListaPresenca = async ()=>{

  const turma = turmaPresenca.value
  const data = dataPresenca.value
  
  // Formatar a data corretamente
  const dataFormatada = formatarDataBR(data)

  const snap = await getDocs(collection(db,"usuarios"))

  // Criar array para ordenar alunos
  let alunos = []

  snap.forEach(d=>{
    const a = d.data()
    if(a.tipo === "aluno"){
      if(turma && a.turma !== turma) return
      alunos.push(a)
    }
  })

  // Ordenar alunos por nome em ordem alfabética
  alunos.sort((a, b) => {
    if (a.nome < b.nome) return -1
    if (a.nome > b.nome) return 1
    return 0
  })

  // Configuração: 15 alunos por página
  const alunosPorPagina = 15
  const totalPaginas = Math.ceil(alunos.length / alunosPorPagina)

  // Criar container principal
  let html = `<div class="pdf-container">`

  for(let pagina = 0; pagina < totalPaginas; pagina++) {
    const inicio = pagina * alunosPorPagina
    const fim = Math.min(inicio + alunosPorPagina, alunos.length)
    const alunosPagina = alunos.slice(inicio, fim)

    // Cabeçalho da página com a logo
    html += `
    <div class="pdf-header">
      <div class="pdf-header-left">
        <img src="assets/img/logo_aprovamaispb.png" class="logo-pdf" alt="Logo AprovaMaisPB" onerror="this.style.display='none'">
        <div>
          <h4 style="margin:0; color:#0d6efd; font-size: 18px;">AprovaMaisPB</h4>
          <small style="color:#555; font-size: 10px;">Lista de Presença</small>
        </div>
      </div>
      <div class="pdf-header-right">
        <div style="font-size: 11px;"><b>Turma:</b> ${turma || "Todas"}</div>
        <div style="font-size: 11px;"><b>Data:</b> ${dataFormatada}</div>
        <div style="font-size: 11px;"><b>Página:</b> ${pagina + 1} de ${totalPaginas}</div>
      </div>
    </div>

    <table class="pdf-table">
      <thead>
        <tr>
          <th style="width: 12%; text-align: center;">Nº</th>
          <th style="width: 55%; text-align: left;">Nome do Aluno</th>
          <th style="width: 33%; text-align: center;">Assinatura</th>
        </tr>
      </thead>
      <tbody>
    `

    let i = inicio + 1
    alunosPagina.forEach(a => {
      html += `
        <tr>
          <td style="text-align: center; vertical-align: middle; font-size: 11px;">${i++}</td>
          <td style="vertical-align: middle; font-size: 11px;">${a.nome}</td>
          <td style="text-align: center; vertical-align: middle;">
            <div class="assinatura-linha"></div>
          </td>
        </tr>`
    })

    // Preencher espaços vazios se necessário
    const espacosVazios = alunosPorPagina - alunosPagina.length
    for(let v = 0; v < espacosVazios; v++) {
      html += `
        <tr>
          <td style="text-align: center; vertical-align: middle; font-size: 11px;">${i + v}</td>
          <td style="vertical-align: middle; font-size: 11px;">&nbsp;</td>
          <td style="text-align: center; vertical-align: middle;">
            <div class="assinatura-linha"></div>
          </td>
        </tr>`
    }

    html += `
      </tbody>
    </table>

    <div class="pdf-footer">
      Sistema AprovaMaisPB • Controle de Presença • Gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString()}
    </div>
    `

    // Adicionar quebra de página (exceto na última)
    if(pagina < totalPaginas - 1) {
      html += `<div class="page-break"></div>`
    }
  }

  html += `</div>`

  document.getElementById("listaPresenca").innerHTML = html
}

// PDF - Configurações otimizadas
window.baixarPDF=()=>{
  const element = document.getElementById("listaPresenca")
  
  // Configurações para melhor formatação do PDF
  const opt = {
    margin:        [0.4, 0.4, 0.4, 0.4],
    filename:     `lista_presenca_${new Date().toLocaleDateString()}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, letterRendering: true, useCORS: true, logging: false },
    jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['css', 'legacy'] }
  }
  
  // Gerar PDF
  html2pdf().from(element).set(opt).save()
}

// INIT
carregarDashboard()
carregarAlunos()
carregarMateriais()

</script>
</body>
</html>
