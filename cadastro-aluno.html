
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastrar Aluno</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h3>Cadastrar Aluno</h3>

<input id="nome" class="form-control mb-2" placeholder="Nome">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="senha" type="password" class="form-control mb-2" placeholder="Senha">

<input id="curso" class="form-control mb-3" placeholder="Curso">

<button class="btn btn-primary" onclick="cadastrarAluno()">Cadastrar</button>

</div>

<script type="module" src="assets/js/cadastro.js"></script>
</body>
</html>
