<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Coordenador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f1f5f9; font-family:Segoe UI; }

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0d6efd;
  color:white;
}

.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.card{
  border:none;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

@media print {
  thead { display: table-header-group; }
  tr, td { page-break-inside: avoid !important; }
}
</style>
</head>

<body>

<div class="topbar">
  <b>🎓 AprovaMaisPB</b>
  <button onclick="location='index.html'" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="menu">
  <button class="btn btn-outline-primary" onclick="mostrar('dashboard')">Dashboard</button>
  <button class="btn btn-outline-primary" onclick="mostrar('cadastro')">Cadastro</button>
  <button class="btn btn-outline-primary" onclick="mostrar('lista')">Alunos</button>
  <button class="btn btn-outline-primary" onclick="mostrar('presenca')">Presença</button>
</div>

<div class="container mt-3">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="row">
<div class="col-6"><div class="card p-3 text-center"><h6>Total</h6><h3 id="totalAlunos">0</h3></div></div>
<div class="col-6"><div class="card p-3 text-center"><h6>Ativos</h6><h3 id="ativos">0</h3></div></div>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none">
<div class="card p-3">
<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="telefone" class="form-control mb-2" placeholder="Telefone">

<select id="turma" class="form-control mb-2">
<option value="Semanal">Semanal</option>
<option value="Sabado">Sabado</option>
</select>

<select id="pagamento" class="form-control mb-2">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="dias" type="number" class="form-control mb-2" placeholder="Dias">

<button class="btn btn-success w-100" onclick="criarAluno()">Cadastrar</button>
</div>
</div>

<!-- ALUNOS -->
<div id="lista" style="display:none">
<input id="busca" class="form-control mb-2" placeholder="Buscar..." onkeyup="carregarAlunos()">
<div id="tabela"></div>
</div>

<!-- PRESENÇA -->
<div id="presenca" style="display:none">

<select id="turmaPresenca" class="form-control mb-2">
<option value="">Todas</option>
<option value="Semanal">Semanal</option>
<option value="Sabado">Sabado</option>
</select>

<input type="date" id="dataPresenca" class="form-control mb-2">

<button class="btn btn-primary mb-2" onclick="gerarListaPresenca()">Gerar</button>
<button class="btn btn-success mb-2" onclick="window.print()">Imprimir</button>

<div id="listaPresenca"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
  authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
  projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app)

// TROCAR ABAS
window.mostrar = (sec)=>{
["dashboard","cadastro","lista","presenca"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(sec).style.display="block"
}

// CADASTRAR ALUNO
window.criarAluno = async () => {

  const nome = nomeInput.value
  const telefone = telefone.value
  const turma = turma.value
  const pagamento = pagamento.value
  const dias = dias.value

  const hoje = new Date()
  const fim = new Date()
  fim.setDate(hoje.getDate() + Number(dias))

  await addDoc(collection(db,"usuarios"),{
    nome,
    telefone,
    turma,
    pagamento,
    tipo:"aluno",
    status:"ativo",
    dataInicio: hoje.toISOString(),
    dataFim: fim.toISOString()
  })

  alert("Aluno cadastrado!")

  carregarAlunos()
}

// LISTAR ALUNOS
window.carregarAlunos = async () => {

  const busca = buscaInput.value.toLowerCase()
  const snap = await getDocs(collection(db,"usuarios"))

  let total = 0
  let ativos = 0
  let html = ""

  snap.forEach(d=>{
    const a = d.data()

    if(a.tipo !== "aluno") return

    total++
    if(a.status === "ativo") ativos++

    if(busca && !a.nome.toLowerCase().includes(busca)) return

    html += `
    <div class="card p-3 mb-2">
      <b>${a.nome}</b><br>
      📞 ${a.telefone}<br>
      🎓 ${a.turma}<br>
      💰 ${a.pagamento}<br>
      📅 Até: ${new Date(a.dataFim).toLocaleDateString()}<br>
      <span class="badge bg-${a.status==="ativo"?"success":"secondary"}">${a.status}</span>
    </div>
    `
  })

  tabela.innerHTML = html
  totalAlunos.innerText = total
  ativos.innerText = ativos
}

// PRESENÇA
window.gerarListaPresenca = async ()=>{

const turma = turmaPresenca.value
const data = dataPresenca.value

const snap = await getDocs(collection(db,"usuarios"))

let html = `<h5>Lista de Presença - ${data || ""}</h5>`
let i=1

snap.forEach(d=>{
const a=d.data()

if(a.tipo==="aluno"){

if(turma && a.turma!==turma) return

html+=`
<div style="display:flex; justify-content:space-between; border-bottom:1px solid #ddd; padding:8px;">
<span>${i++} - ${a.nome}</span>
<span>________________________</span>
</div>`
}
})

listaPresenca.innerHTML=html
}

// INIT
window.onload = () => {
  carregarAlunos()
}

</script>
</body>
</html>
