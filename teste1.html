<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Coordenador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f1f5f9; font-family:Segoe UI; }

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0d6efd;
  color:white;
}

.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.card{
  border:none;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.vencido{
  border-left:5px solid red;
}
</style>
</head>

<body>

<div class="topbar">
  <b>🎓 AprovaMaisPB</b>
  <button onclick="logout()" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="menu">
  <button class="btn btn-outline-primary" onclick="mostrar('dashboard')">Dashboard</button>
  <button class="btn btn-outline-primary" onclick="mostrar('cadastro')">Cadastro</button>
  <button class="btn btn-outline-primary" onclick="mostrar('lista')">Alunos</button>
  <button class="btn btn-outline-primary" onclick="mostrar('materiais')">Materiais</button>
</div>

<div class="container mt-3">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="row">
    <div class="col-6"><div class="card p-3 text-center"><h6>Total</h6><h3 id="totalAlunos">0</h3></div></div>
    <div class="col-6"><div class="card p-3 text-center"><h6>Ativos</h6><h3 id="ativos">0</h3></div></div>
    <div class="col-6 mt-2"><div class="card p-3 text-center"><h6>Semanal</h6><h3 id="semanal">0</h3></div></div>
    <div class="col-6 mt-2"><div class="card p-3 text-center"><h6>Sábado</h6><h3 id="sabado">0</h3></div></div>
  </div>

  <div class="card p-3 mt-3">
    <h5 class="text-danger">⚠️ Matrículas Vencidas</h5>
    <div id="vencidos"></div>
  </div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none">
  <div class="card p-3">
    <input id="nome" class="form-control mb-2" placeholder="Nome">
    <input id="telefone" class="form-control mb-2" placeholder="Telefone">

    <select id="turma" class="form-control mb-2">
      <option value="Semanal">Semanal</option>
      <option value="Sabado">Sabado</option>
    </select>

    <select id="pagamento" class="form-control mb-2">
      <option>Pix</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>

    <input id="dias" type="number" class="form-control mb-2" placeholder="Dias da matrícula (ex: 30)">

    <button class="btn btn-success w-100" onclick="criarAluno()">Cadastrar</button>
  </div>
</div>

<!-- ALUNOS -->
<div id="lista" style="display:none">
  <input id="busca" class="form-control mb-2" placeholder="Buscar..." onkeyup="carregarAlunos()">
  <div id="tabela"></div>
</div>

<!-- MATERIAIS -->
<div id="materiais" style="display:none">
  <div class="card p-3 mb-3">

    <input id="titulo" class="form-control mb-2" placeholder="Título">

    <select id="materia" class="form-control mb-2">
      <option>Matemática</option>
      <option>Português</option>
      <option>Biologia</option>
      <option>Física</option>
    </select>

    <select id="turmaMaterial" class="form-control mb-2">
      <option value="Semanal">Semanal</option>
      <option value="Sabado">Sabado</option>
      <option value="Ambas">Ambas</option>
    </select>

    <input id="linkDrive" class="form-control mb-2" placeholder="Link do Drive">

    <button class="btn btn-primary w-100" onclick="salvarLink()">Salvar</button>
  </div>

  <div id="listaMateriais"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE
const app = initializeApp({
  apiKey:"SUA_API_KEY",
  authDomain:"SEU_DOMINIO",
  projectId:"SEU_PROJETO"
});

const db = getFirestore(app)

// UI
window.logout = ()=> location="index.html"

window.mostrar = sec=>{
  ["dashboard","cadastro","lista","materiais"].forEach(id=>{
    document.getElementById(id).style.display="none"
  })
  document.getElementById(sec).style.display="block"
}

// CADASTRO
window.criarAluno = async ()=>{

  const nome = document.getElementById("nome").value
  const telefone = document.getElementById("telefone").value
  const turma = document.getElementById("turma").value
  const pagamento = document.getElementById("pagamento").value
  const dias = parseInt(document.getElementById("dias").value) || 30

  if(!nome || !telefone){
    alert("Preencha nome e telefone")
    return
  }

  const usuario = "AP"+Math.floor(10000 + Math.random()*90000)
  const senha = Math.random().toString(36).substring(2,8)

  const inicio = new Date()
  const fim = new Date()
  fim.setDate(inicio.getDate() + dias)

  await addDoc(collection(db,"usuarios"),{
    nome,
    telefone,
    turma,
    usuario,
    senha,
    tipo:"aluno",
    pagamento,
    dataInicio: inicio.toISOString(),
    dataFim: fim.toISOString()
  })

  alert(`Aluno criado!\nUsuário: ${usuario}\nSenha: ${senha}`)

  carregarAlunos()
  carregarDashboard()
}

// DASHBOARD
async function carregarDashboard(){

  const snap = await getDocs(collection(db,"usuarios"))

  let total=0, ativos=0, semanal=0, sabado=0
  let html=""

  const hoje = new Date()

  snap.forEach(d=>{
    const a = d.data()

    if(a.tipo==="aluno"){

      total++

      if(a.turma==="Semanal") semanal++
      if(a.turma==="Sabado") sabado++

      if(a.dataFim){
        const fim = new Date(a.dataFim)

        if(fim >= hoje){
          ativos++
        }else{
          html += `<div class="alert alert-danger">${a.nome} vencido</div>`
        }
      }
    }
  })

  document.getElementById("totalAlunos").innerText = total
  document.getElementById("ativos").innerText = ativos
  document.getElementById("semanal").innerText = semanal
  document.getElementById("sabado").innerText = sabado
  document.getElementById("vencidos").innerHTML = html
}

// LISTA
async function carregarAlunos(){

  const busca = document.getElementById("busca").value.toLowerCase()
  const snap = await getDocs(collection(db,"usuarios"))

  let html=""
  const hoje = new Date()

  snap.forEach(d=>{
    const a = d.data()

    if(a.tipo==="aluno" && a.nome?.toLowerCase().includes(busca)){

      const fim = a.dataFim ? new Date(a.dataFim) : null
      const dataFormatada = fim ? fim.toLocaleDateString() : "Sem data"

      const vencido = fim && fim < hoje

      html += `
      <div class="card p-2 mb-2 ${vencido ? 'vencido' : ''}">
        <b>${a.nome}</b> (${a.turma || "-"})<br>
        📅 ${dataFormatada} <br>
        💳 ${a.pagamento || "Não informado"}<br>

        <button onclick="renovar('${d.id}','${a.telefone}')" class="btn btn-success btn-sm">
          Renovar +30d
        </button>

        <button onclick="editarAluno(this)" class="btn btn-warning btn-sm"
          data-id="${d.id}"
          data-nome="${a.nome}"
          data-telefone="${a.telefone}"
          data-turma="${a.turma}"
          data-pagamento="${a.pagamento}"
          data-inicio="${a.dataInicio}"
          data-fim="${a.dataFim}">
          Editar
        </button>

        <button onclick="del('${d.id}')" class="btn btn-danger btn-sm">Excluir</button>
      </div>`
    }
  })

  tabela.innerHTML = html
}

// RENOVAR + WHATSAPP
window.renovar = async (id, telefone)=>{

  const ref = doc(db,"usuarios",id)
  const docSnap = await getDoc(ref)

  const aluno = docSnap.data()

  const atualFim = aluno.dataFim ? new Date(aluno.dataFim) : new Date()

  const novoFim = new Date(atualFim)
  novoFim.setDate(novoFim.getDate() + 30)

  await updateDoc(ref,{
    dataFim: novoFim.toISOString()
  })

  const numero = telefone.replace(/\D/g,'')

  const msg = `Olá, sua matrícula foi renovada por mais 30 dias!`

  window.open(`https://wa.me/55${numero}?text=${encodeURIComponent(msg)}`,"_blank")

  carregarAlunos()
  carregarDashboard()
}

// EDITAR
window.editarAluno = async btn=>{

  const id = btn.dataset.id

  const nome = prompt("Nome:", btn.dataset.nome)
  if(nome===null) return

  const telefone = prompt("Telefone:", btn.dataset.telefone)
  if(telefone===null) return

  const turma = prompt("Turma:", btn.dataset.turma)
  if(turma===null) return

  const pagamento = prompt("Pagamento:", btn.dataset.pagamento)
  if(pagamento===null) return

  const inicio = prompt("Data início (YYYY-MM-DD):", btn.dataset.inicio?.substring(0,10))
  if(inicio===null) return

  const fim = prompt("Data fim (YYYY-MM-DD):", btn.dataset.fim?.substring(0,10))
  if(fim===null) return

  let senha = ""
  if(confirm("Resetar senha?")){
    senha = Math.random().toString(36).substring(2,8)
    alert("Nova senha: " + senha)
  }

  const updateData = {
    nome,
    telefone,
    turma,
    pagamento,
    dataInicio: new Date(inicio).toISOString(),
    dataFim: new Date(fim).toISOString()
  }

  if(senha) updateData.senha = senha

  await updateDoc(doc(db,"usuarios",id), updateData)

  alert("Atualizado!")

  carregarAlunos()
  carregarDashboard()
}

// EXCLUIR
window.del = async id=>{
  await deleteDoc(doc(db,"usuarios",id))
  carregarAlunos()
  carregarDashboard()
}

// MATERIAIS
window.salvarLink = async ()=>{
  const titulo = document.getElementById("titulo").value
  const materia = document.getElementById("materia").value
  const turma = document.getElementById("turmaMaterial").value
  const url = document.getElementById("linkDrive").value

  await addDoc(collection(db,"materiais"),{ titulo, materia, turma, url })

  carregarMateriais()
}

async function carregarMateriais(){

  const snap = await getDocs(collection(db,"materiais"))

  let html=""

  snap.forEach(d=>{
    const m = d.data()

    html += `
    <div class="card p-2 mb-2">
      <b>${m.titulo}</b><br>
      ${m.materia} - ${m.turma}<br>

      <button onclick="delMat('${d.id}')" class="btn btn-danger btn-sm">Excluir</button>
    </div>`
  })

  listaMateriais.innerHTML = html
}

window.delMat = async id=>{
  await deleteDoc(doc(db,"materiais",id))
  carregarMateriais()
}

// START
carregarAlunos()
carregarDashboard()
carregarMateriais()

</script>
</body>
</html>
