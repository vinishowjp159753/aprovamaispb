<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Aluno - AprovaMaisPB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f7fb; font-family:Arial, sans-serif; }
.topbar { display:flex; justify-content:space-between; align-items:center; padding:12px; background:#0d6efd; color:white; }
.card { border-radius:12px; }
.progresso { height:8px; background:#ddd; border-radius:10px; overflow:hidden; }
.progresso-bar { height:8px; background:#0d6efd; }
.badge-novo { background:red; color:white; font-size:10px; padding:3px 6px; border-radius:6px; margin-left:5px; }
</style>
</head>

<body>

<div class="topbar">
  <div>
    <b id="nomeAluno"></b><br>
    <small id="tipoTurma"></small>
  </div>
  <button onclick="logout()" class="btn btn-light btn-sm">Sair</button>
</div>

<div class="container mt-3">

  <h5>📚 Seus Materiais</h5>

  <!-- FILTRO -->
  <select id="filtroMateria" class="form-select mb-3">
    <option value="todas">Todas as matérias</option>
    <option>Redação</option>
    <option>Matemática</option>
    <option>Química</option>
    <option>Física</option>
    <option>Biologia</option>
    <option>Sociologia</option>
    <option>Filosofia</option>
    <option>Literatura</option>
    <option>Gramática</option>
    <option>Inglês</option>
    <option>Espanhol</option>
  </select>

  <div id="continuar" class="mb-3"></div>
  <div id="materiais"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
  authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
  projectId:"aprovamaispb2-3bc78"
});

const db = getFirestore(app)

// 🔐 USUÁRIO
const usuario = localStorage.getItem("usuario")
const nome = localStorage.getItem("nome")
const tipo = localStorage.getItem("tipo")

// 🔥 NORMALIZA TURMA (ANTI-BUG)
const turma = (localStorage.getItem("turma") || "Semanal").toLowerCase()

if(!usuario || tipo !== "aluno"){
  window.location.href="index.html"
}

document.getElementById("nomeAluno").innerText = nome

// 👇 EXIBE TURMA BONITO
document.getElementById("tipoTurma").innerText =
  turma === "sabado" ? "Extensivo Sábado" : "Extensivo Semanal"

// 📊 PROGRESSO
let progresso = JSON.parse(localStorage.getItem("progresso_"+usuario)) || {}

// 🔎 FILTRO
const filtroSelect = document.getElementById("filtroMateria")
filtroSelect.addEventListener("change", carregarMateriais)

async function carregarMateriais(){

  const filtroMateria = filtroSelect.value
  const snap = await getDocs(collection(db,"materiais"))

  let html = ""
  let total = 0
  let vistos = 0
  let ultimo = null

  snap.forEach(doc=>{

    const m = doc.data()
    const id = doc.id

    // 🔥 NORMALIZA TURMA DO FIREBASE
    const turmaMaterial = (m.turma || "").toLowerCase()

    // 🎯 FILTRO DE TURMA (CORRIGIDO)
    if(turmaMaterial !== turma && turmaMaterial !== "ambas") return

    // 🎯 FILTRO DE MATÉRIA
    if(filtroMateria !== "todas" && m.materia !== filtroMateria) return

    total++

    if(progresso[id]){
      vistos++
      ultimo = m
    }

    html += `
      <div class="card p-3 mb-2">
        <b>${m.titulo} ${!progresso[id] ? '<span class="badge-novo">NOVO</span>' : ''}</b><br>
        <small>${m.materia}</small><br>
        <button class="btn btn-primary btn-sm mt-2" onclick="abrir('${m.url}','${id}')">
          Abrir Material
        </button>
      </div>
    `
  })

  // ▶️ CONTINUAR
  if(ultimo){
    document.getElementById("continuar").innerHTML = `
      <div class="card p-2">
        <b>▶️ Continuar de onde parou</b><br>
        ${ultimo.titulo}<br>
        <button class="btn btn-success btn-sm mt-2" onclick="window.open('${ultimo.url}')">
          Continuar
        </button>
      </div>
    `
  } else {
    document.getElementById("continuar").innerHTML = ""
  }

  // 📊 PROGRESSO
  const porcentagem = total ? Math.floor((vistos/total)*100) : 0

  html = `
    <div class="mb-3">
      <b>Seu progresso: ${porcentagem}%</b>
      <div class="progresso">
        <div class="progresso-bar" style="width:${porcentagem}%"></div>
      </div>
    </div>
  ` + html

  document.getElementById("materiais").innerHTML = html
}

// ▶️ ABRIR
window.abrir = (url,id)=>{
  progresso[id] = true
  localStorage.setItem("progresso_"+usuario, JSON.stringify(progresso))
  window.open(url)
  carregarMateriais()
}

// 🚪 LOGOUT
window.logout = ()=>{
  localStorage.removeItem("usuario")
  localStorage.removeItem("nome")
  localStorage.removeItem("tipo")
  localStorage.removeItem("turma")
  window.location.href="index.html"
}

// 🚀 INICIAR
carregarMateriais()

</script>
</body>
</html>
