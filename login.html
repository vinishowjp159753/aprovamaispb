<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AprovaMaisPB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
font-family:Arial;
}

.card{
width:420px;
border-radius:15px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.logo{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
color:#1e3a8a;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🎓 AprovaMaisPB
</div>

<input id="usuario" class="form-control mb-3" placeholder="Usuário">

<input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

<select id="tipo" class="form-control mb-3">
<option value="aluno">Aluno</option>
<option value="coordenador">Coordenador</option>
</select>

<button class="btn btn-primary w-100" onclick="login()">
Entrar
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain: "aprovamaispb2-3bc78.firebaseapp.com",
projectId: "aprovamaispb2-3bc78",
storageBucket: "aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId: "830264910104",
appId: "1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId: "G-PM06K116GT"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

const usuario = document.getElementById("usuario").value
const senha = document.getElementById("senha").value
const tipo = document.getElementById("tipo").value

const q = query(
collection(db,"usuarios"),
where("usuario","==",usuario),
where("senha","==",senha),
where("tipo","==",tipo)
)

const snap = await getDocs(q)

if(snap.empty){

alert("Usuário ou senha inválidos")
return

}

localStorage.setItem("usuario",usuario)

if(tipo==="aluno") window.location="aluno.html"
if(tipo==="coordenador") window.location="coordenador.html"

}

</script>

</body>
</html>
