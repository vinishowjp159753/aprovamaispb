<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AprovaMaisPB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
font-family:Arial;
}

.card{
width:420px;
border-radius:15px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.logo{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
color:#1e3a8a;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🎓 AprovaMaisPB
</div>

<input id="usuario" class="form-control mb-3" placeholder="Usuário">

<input id="senha" type="password" class="form-control mb-2" placeholder="Senha">

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="lembrar">
<label class="form-check-label">Lembrar usuário</label>
</div>

<button class="btn btn-primary w-100" onclick="login()">
Entrar
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain:"aprovamaispb2-3bc78.firebaseapp.com",
projectId:"aprovamaispb2-3bc78"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 LEMBRAR USUÁRIO */
window.onload = ()=>{
const salvo = localStorage.getItem("lembrarUsuario")
if(salvo){
document.getElementById("usuario").value = salvo
document.getElementById("lembrar").checked = true
}
}

/* 🔐 LOGIN */
window.login = async function(){

let usuario = document.getElementById("usuario").value.trim()
let senha = document.getElementById("senha").value.trim()
let lembrar = document.getElementById("lembrar").checked

if(!usuario || !senha){
alert("Preencha usuário e senha")
return
}

const snap = await getDocs(collection(db,"usuarios"))

let encontrou = false

for (const docu of snap.docs){

const u = docu.data()

if(
u.usuario === usuario &&
String(u.senha) === senha
){

encontrou = true

// ✅ SALVAR SESSÃO COMPLETA
localStorage.setItem("usuario", u.usuario)
localStorage.setItem("nome", u.nome)
localStorage.setItem("tipo", u.tipo)

// 🔥 CORREÇÃO PRINCIPAL
localStorage.setItem("turma", (u.turma || "Semanal").trim())

// lembrar usuário
if(lembrar){
localStorage.setItem("lembrarUsuario", usuario)
}else{
localStorage.removeItem("lembrarUsuario")
}

// redirecionamento
if(u.tipo === "aluno"){
window.location = "aluno.html"
}

if(u.tipo === "coordenador"){
window.location = "coordenador.html"
}

break
}
}

if(!encontrou){
alert("Usuário ou senha inválidos")
}

}

</script>

</body>
</html>
