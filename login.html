<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aprova Mais PB - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
font-family:Arial;
}

.card{
width:400px;
border-radius:15px;
padding:30px;
}

.logo{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🎓 Aprova Mais PB
</div>

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

<select id="tipo" class="form-control mb-3">

<option value="aluno">Aluno</option>
<option value="coordenador">Coordenador</option>

</select>

<button class="btn btn-primary w-100" onclick="login()">
Entrar
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBRm4yix2fC2PhAVjTtbWlR-azz0bAglpo",
authDomain: "aprovamaispb2-3bc78.firebaseapp.com",
projectId: "aprovamaispb2-3bc78",
storageBucket: "aprovamaispb2-3bc78.firebasestorage.app",
messagingSenderId: "830264910104",
appId: "1:830264910104:web:0c0c6a9b1930c155c47e6d",
measurementId: "G-PM06K116GT"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

const email = document.getElementById("email").value
const senha = document.getElementById("senha").value
const tipo = document.getElementById("tipo").value

try{

await signInWithEmailAndPassword(auth,email,senha)

if(tipo === "aluno"){
window.location.href="aluno.html"
}

if(tipo === "coordenador"){
window.location.href="coordenador.html"
}

}catch(e){

alert("Erro no login")

}

}

</script>

</body>
</html>
