
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="container mt-5">

<h3>Upload de Materiais</h3>

<div class="mb-3">
<input class="form-control" id="titulo" placeholder="Título">
</div>

<div class="mb-3">
<select class="form-control" id="materia">
<option>Matemática</option>
<option>Português</option>
<option>História</option>
</select>
</div>

<div class="mb-3">
<input type="file" id="arquivo" class="form-control">
</div>

<div class="mb-3 form-check">
<input type="checkbox" id="destaque" class="form-check-input">
<label class="form-check-label">Material em destaque</label>
</div>

<button class="btn btn-success" onclick="uploadMaterial()">Enviar Material</button>

</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
